<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ear Training Accordi</title>
  
  <!-- Tailwind CSS (Caricato via CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (Caricati via CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel per compilare il codice JSX direttamente nel browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <!-- Qui verrà montata l'app -->
  <div id="root"></div>

  <!-- Inizio codice dell'Applicazione -->
  <script type="text/babel">
    const { useState, useRef } = React;

    // --- COMPONENTI ICONE ---
    const Icon = ({ children, size = 24, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3" /></Icon>;
    const Check = (props) => <Icon {...props}><polyline points="20 6 9 17 4 12" /></Icon>;
    const RefreshCw = (props) => <Icon {...props}><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></Icon>;
    const Volume2 = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></Icon>;
    const AlertCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></Icon>;
    const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></Icon>;
    const Music = (props) => <Icon {...props}><path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" /></Icon>;
    const Flame = (props) => <Icon {...props}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" /></Icon>;
    const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></Icon>;
    const Trophy = (props) => <Icon {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></Icon>;
    // Nuove Icone per lo scorrimento
    const ChevronLeft = (props) => <Icon {...props}><polyline points="15 18 9 12 15 6" /></Icon>;
    const ChevronRight = (props) => <Icon {...props}><polyline points="9 18 15 12 9 6" /></Icon>;

    // Frequenze delle note per l'AudioContext
    const FREQUENCIES = {
      'C4': 261.63, 'Db4': 277.18, 'D4': 293.66, 'Eb4': 311.13, 'E4': 329.63, 'F4': 349.23, 'Gb4': 369.99, 'G4': 392.00, 'Ab4': 415.30, 'A4': 440.00, 'Bb4': 466.16, 'B4': 493.88,
      'C5': 523.25, 'Db5': 554.37, 'D5': 587.33, 'Eb5': 622.25, 'E5': 659.25, 'F5': 698.46, 'Gb5': 739.99, 'G5': 783.99, 'Ab5': 830.61, 'A5': 880.00, 'Bb5': 932.33, 'B5': 987.77
    };

    // Nomi degli intervalli per la generazione automatica (da 1 a 12 semitoni)
    const INTERVAL_NAMES = [
      "Unisono", "Seconda Minore", "Seconda Maggiore", "Terza Minore", "Terza Maggiore",
      "Quarta Giusta", "Tritono", "Quinta Giusta", "Sesta Minore", "Sesta Maggiore",
      "Settima Minore", "Settima Maggiore", "Ottava Giusta"
    ];

    // Layout della tastiera (2 ottave)
    const PIANO_KEYS = [
      { id: 'C4', type: 'white', label: 'Do' }, { id: 'Db4', type: 'black', label: 'Do#' },
      { id: 'D4', type: 'white', label: 'Re' }, { id: 'Eb4', type: 'black', label: 'Re#' },
      { id: 'E4', type: 'white', label: 'Mi' },
      { id: 'F4', type: 'white', label: 'Fa' }, { id: 'Gb4', type: 'black', label: 'Fa#' },
      { id: 'G4', type: 'white', label: 'Sol' }, { id: 'Ab4', type: 'black', label: 'Sol#' },
      { id: 'A4', type: 'white', label: 'La' }, { id: 'Bb4', type: 'black', label: 'La#' },
      { id: 'B4', type: 'white', label: 'Si' },
      { id: 'C5', type: 'white', label: 'Do' }, { id: 'Db5', type: 'black', label: 'Do#' },
      { id: 'D5', type: 'white', label: 'Re' }, { id: 'Eb5', type: 'black', label: 'Re#' },
      { id: 'E5', type: 'white', label: 'Mi' },
      { id: 'F5', type: 'white', label: 'Fa' }, { id: 'Gb5', type: 'black', label: 'Fa#' },
      { id: 'G5', type: 'white', label: 'Sol' }, { id: 'Ab5', type: 'black', label: 'Sol#' },
      { id: 'A5', type: 'white', label: 'La' }, { id: 'Bb5', type: 'black', label: 'La#' },
      { id: 'B5', type: 'white', label: 'Si' }
    ];

    // Catalogo degli accordi statici (Principiante e Intermedio ora sono generativi)
    const CHORD_CATEGORIES = {
      'Avanzato': [
        { name: 'Do Maggiore', notes: ['C4', 'E4', 'G4'] }, { name: 'Sol Maggiore', notes: ['G4', 'B4', 'D5'] },
        { name: 'Re Maggiore', notes: ['D4', 'Gb4', 'A4'] }, { name: 'La Maggiore', notes: ['A4', 'Db5', 'E5'] },
        { name: 'Mi Maggiore', notes: ['E4', 'Ab4', 'B4'] }, { name: 'Fa Maggiore', notes: ['F4', 'A4', 'C5'] },
        { name: 'Sib Maggiore', notes: ['Bb4', 'D5', 'F5'] }, { name: 'Mib Maggiore', notes: ['Eb4', 'G4', 'Bb4'] },
        { name: 'Do# Maggiore', notes: ['Db4', 'F4', 'Ab4'] }, { name: 'Lab Maggiore', notes: ['Ab4', 'C5', 'Eb5'] },
        { name: 'Si Maggiore', notes: ['B4', 'Eb5', 'Gb5'] }, { name: 'La Minore', notes: ['A4', 'C5', 'E5'] },
        { name: 'Mi Minore', notes: ['E4', 'G4', 'B4'] }, { name: 'Si Minore', notes: ['B4', 'D5', 'Gb5'] },
        { name: 'Fa# Minore', notes: ['Gb4', 'A4', 'Db5'] }, { name: 'Do# Minore', notes: ['Db4', 'E4', 'Ab4'] },
        { name: 'Re Minore', notes: ['D4', 'F4', 'A4'] }, { name: 'Sol Minore', notes: ['G4', 'Bb4', 'D5'] },
        { name: 'Do Minore', notes: ['C4', 'Eb4', 'G4'] }, { name: 'Sol# Minore', notes: ['Ab4', 'B4', 'Eb5'] },
        { name: 'Sib Minore', notes: ['Bb4', 'Db5', 'F5'] }
      ],
      'Pro': [
        { name: 'Do sus4', notes: ['C4', 'F4', 'G4'] }, { name: 'Re sus4', notes: ['D4', 'G4', 'A4'] },
        { name: 'Mi sus4', notes: ['E4', 'A4', 'B4'] }, { name: 'Fa# sus4', notes: ['Gb4', 'B4', 'Db5'] },
        { name: 'Sol sus4', notes: ['G4', 'C5', 'D5'] }, { name: 'La sus4', notes: ['A4', 'D5', 'E5'] },
        { name: 'Si sus4', notes: ['B4', 'E5', 'Gb5'] }, { name: 'Do sus2', notes: ['C4', 'D4', 'G4'] },
        { name: 'Re sus2', notes: ['D4', 'E4', 'A4'] }, { name: 'Fa sus2', notes: ['F4', 'G4', 'C5'] },
        { name: 'Sol sus2', notes: ['G4', 'A4', 'D5'] }, { name: 'La sus2', notes: ['A4', 'B4', 'E5'] },
        { name: 'Do Aumentato', notes: ['C4', 'E4', 'Ab4'] }, { name: 'Mib Aumentato', notes: ['Eb4', 'G4', 'B4'] },
        { name: 'Fa Aumentato', notes: ['F4', 'A4', 'Db5'] }, { name: 'Sol Aumentato', notes: ['G4', 'B4', 'Eb5'] },
        { name: 'La Aumentato', notes: ['A4', 'Db5', 'F5'] }, { name: 'Re Diminuito', notes: ['D4', 'F4', 'Ab4'] },
        { name: 'Mi Diminuito', notes: ['E4', 'G4', 'Bb4'] }, { name: 'Fa# Diminuito', notes: ['Gb4', 'A4', 'C5'] },
        { name: 'Sol# Diminuito', notes: ['Ab4', 'B4', 'D5'] }, { name: 'Si Diminuito', notes: ['B4', 'D5', 'F5'] }
      ],
      'Jazz': [
        { name: 'Do Maj7', notes: ['C4', 'E4', 'G4', 'B4'] }, { name: 'Fa Maj7', notes: ['F4', 'A4', 'C5', 'E5'] },
        { name: 'Sol Dom7', notes: ['G4', 'B4', 'D5', 'F5'] }, { name: 'Re Min7', notes: ['D4', 'F4', 'A4', 'C5'] },
        { name: 'Si Semidiminuito', notes: ['B4', 'D5', 'F5', 'A5'] }, { name: 'Do Maj9', notes: ['C4', 'E4', 'G4', 'B4', 'D5'] },
        { name: 'Sol Min9', notes: ['G4', 'Bb4', 'D5', 'F5', 'A5'] }, { name: 'Sol 7b9', notes: ['G4', 'B4', 'D5', 'F5', 'Ab5'] },
        { name: 'Do 6/9', notes: ['C4', 'E4', 'A4', 'D5'] }, { name: 'La Min11', notes: ['A4', 'C5', 'D5', 'E5', 'G5'] },
        { name: 'Do Maj9#11', notes: ['C4', 'E4', 'G4', 'B4', 'D5', 'Gb5'] }, { name: 'Mi 7#9', notes: ['E4', 'Ab4', 'D5', 'G5'] },
        { name: 'Sol 13', notes: ['G4', 'B4', 'D5', 'F5', 'E5'] }, { name: 'Do 7alt', notes: ['C4', 'E4', 'Ab4', 'Bb4', 'Eb5'] },
        { name: 'Re 7b9b13', notes: ['D4', 'Gb4', 'C5', 'Eb5', 'Bb5'] }, { name: 'Fa m7b5', notes: ['F4', 'Ab4', 'B4', 'Eb5'] },
        { name: 'La Maj7', notes: ['A4', 'Db5', 'E5', 'Ab5'] }, { name: 'Re Dom7', notes: ['D4', 'Gb4', 'A4', 'C5'] },
        { name: 'Do Min7', notes: ['C4', 'Eb4', 'G4', 'Bb4'] }, { name: 'Mi Min11', notes: ['E4', 'G4', 'B4', 'D5', 'A5'] },
        { name: 'Fa 7alt', notes: ['F4', 'A4', 'Db5', 'Eb5', 'Gb5'] }, { name: 'Do# m7b5', notes: ['Db4', 'E4', 'G4', 'B4'] }
      ]
    };

    function App() {
      const [gameState, setGameState] = useState('idle'); 
      const [difficulty, setDifficulty] = useState('Principiante');
      const [currentChord, setCurrentChord] = useState(null);
      
      // Nuovo Sistema Punteggi: Streak di Stelle e Record
      const [stats, setStats] = useState({
        'Principiante': { current: 0, best: 0 },
        'Intermedio': { current: 0, best: 0 },
        'Avanzato': { current: 0, best: 0 },
        'Pro': { current: 0, best: 0 },
        'Jazz': { current: 0, best: 0 }
      });
      
      const [replayCount, setReplayCount] = useState(0);
      const [errorCount, setErrorCount] = useState(0);
      const [earnedStarsForRound, setEarnedStarsForRound] = useState(0);
      
      const [selectedNotes, setSelectedNotes] = useState([]);
      const [activeBoxIndex, setActiveBoxIndex] = useState(0); 
      
      const [startTime, setStartTime] = useState(null);
      const [timeTaken, setTimeTaken] = useState(null);
      const [errorStatus, setErrorStatus] = useState(false);
      const [mistakeMade, setMistakeMade] = useState(false);
      
      const audioCtxRef = useRef(null);
      const pianoRef = useRef(null); // Ref per il container del piano (per i tasti freccia)

      const initAudio = () => {
        if (!audioCtxRef.current) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          const ctx = new AudioContext();
          
          const compressor = ctx.createDynamicsCompressor();
          compressor.threshold.setValueAtTime(-24, ctx.currentTime);
          compressor.knee.setValueAtTime(30, ctx.currentTime);
          compressor.ratio.setValueAtTime(12, ctx.currentTime);
          compressor.attack.setValueAtTime(0.003, ctx.currentTime);
          compressor.release.setValueAtTime(0.25, ctx.currentTime);
          compressor.connect(ctx.destination);
          
          ctx.masterCompressor = compressor;
          audioCtxRef.current = ctx;
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      const playTone = (frequency, duration = 2.5, volume = 0.5, startTimeOffset = 0) => {
        if (!audioCtxRef.current) return;
        const ctx = audioCtxRef.current;
        const startTime = ctx.currentTime + startTimeOffset;
        
        const masterGain = ctx.createGain();
        masterGain.connect(ctx.masterCompressor || ctx.destination);
        
        const safeVolume = volume * 0.4;
        
        masterGain.gain.setValueAtTime(0, startTime);
        masterGain.gain.linearRampToValueAtTime(safeVolume, startTime + 0.02);
        masterGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.Q.value = 1;
        filter.frequency.setValueAtTime(frequency * 3 + 1000, startTime);
        filter.frequency.exponentialRampToValueAtTime(frequency + 200, startTime + 0.2);
        filter.connect(masterGain);
        
        const osc1 = ctx.createOscillator();
        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(frequency, startTime);
        osc1.connect(filter);
        osc1.start(startTime);
        osc1.stop(startTime + duration);
        
        const osc2 = ctx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(frequency * 2, startTime);
        const gain2 = ctx.createGain();
        gain2.gain.value = 0.3;
        osc2.connect(gain2);
        gain2.connect(filter);
        osc2.start(startTime);
        osc2.stop(startTime + duration);
        
        const osc3 = ctx.createOscillator();
        osc3.type = 'sine';
        osc3.frequency.setValueAtTime(frequency * 3, startTime);
        const gain3 = ctx.createGain();
        gain3.gain.value = 0.1;
        osc3.connect(gain3);
        gain3.connect(filter);
        osc3.start(startTime);
        osc3.stop(startTime + duration);
      };

      const playTargetChord = () => {
        initAudio();
        if (currentChord) {
          currentChord.notes.forEach(noteId => {
            playTone(FREQUENCIES[noteId], 2.0, 0.4);
          });
        }
      };

      const playUserChord = () => {
        if (gameState === 'playing') {
          setReplayCount(prev => prev + 1); 
        }
        initAudio();
        selectedNotes.forEach(noteId => {
          if (noteId) {
            playTone(FREQUENCIES[noteId], 2.0, 0.4);
          }
        });
      };

      const playUserArpeggio = () => {
        if (gameState === 'playing') {
          setReplayCount(prev => prev + 1); 
        }
        initAudio();
        let delayIndex = 0;
        selectedNotes.forEach(noteId => {
          if (noteId) {
            playTone(FREQUENCIES[noteId], 2.0, 0.4, delayIndex * 0.5);
            delayIndex++;
          }
        });
      };

      const handleDifficultyChange = (newDiff) => {
        setDifficulty(newDiff);
        if (gameState === 'playing') {
          setGameState('idle');
        }
      };

      const startGame = () => {
        initAudio();
        
        let targetChord;
        let initialSelectedNotes;
        let initialActiveBox = 0;

        // Generazione Dinamica
        if (difficulty === 'Principiante') {
          const randomKey = PIANO_KEYS[Math.floor(Math.random() * PIANO_KEYS.length)];
          targetChord = { name: `Nota ${randomKey.label}`, notes: [randomKey.id] };
          initialSelectedNotes = [null];
          
        } else if (difficulty === 'Intermedio') {
          // Genera un intervallo (1-12 semitoni)
          const baseIndex = Math.floor(Math.random() * (PIANO_KEYS.length - 12));
          const intervalDistance = Math.floor(Math.random() * 12) + 1;
          const targetIndex = baseIndex + intervalDistance;
          
          const baseKey = PIANO_KEYS[baseIndex];
          const targetKey = PIANO_KEYS[targetIndex];
          
          targetChord = { 
            name: `Intervallo: ${INTERVAL_NAMES[intervalDistance]}`, 
            notes: [baseKey.id, targetKey.id] 
          };
          initialSelectedNotes = [baseKey.id, null]; // Regala la prima nota
          initialActiveBox = 1; // Sposta il focus direttamente sulla seconda nota
          
        } else {
          // Selezione da dizionario (Avanzato, Pro, Jazz)
          const chordsList = CHORD_CATEGORIES[difficulty];
          do {
            targetChord = chordsList[Math.floor(Math.random() * chordsList.length)];
          } while (currentChord && targetChord.name === currentChord.name && chordsList.length > 1);
          initialSelectedNotes = new Array(targetChord.notes.length).fill(null);
        }

        setCurrentChord(targetChord);
        setSelectedNotes(initialSelectedNotes);
        setActiveBoxIndex(initialActiveBox); 
        setStartTime(Date.now());
        setTimeTaken(null);
        setGameState('playing');
        
        setErrorStatus(false);
        setReplayCount(0);
        setErrorCount(0);
        setEarnedStarsForRound(0);
        setMistakeMade(false);
        
        setTimeout(() => {
          targetChord.notes.forEach(noteId => {
            playTone(FREQUENCIES[noteId], 2.0, 0.4);
          });
        }, 100);
      };

      const assignNoteToActiveBox = (noteId) => {
        if (gameState !== 'playing' || activeBoxIndex === null) return;
        
        initAudio();
        playTone(FREQUENCIES[noteId], 1.0, 0.6);
        setErrorStatus(false);
        
        setSelectedNotes(prev => {
          const newNotes = [...prev];
          newNotes[activeBoxIndex] = noteId; 
          return newNotes;
        });
      };

      const selectBox = (index) => {
        if (gameState === 'playing') {
          // Blocca la selezione del primo box se siamo in modalità Intermedio (è regalato)
          if (difficulty === 'Intermedio' && index === 0) return;
          setActiveBoxIndex(index);
        }
      };

      const calculatePotentialStars = () => {
        let baseStars = 3;
        if (replayCount > 0 && replayCount <= 2) baseStars = 2;
        else if (replayCount > 2) baseStars = 1;

        return Math.max(0, baseStars - errorCount);
      };

      const checkAnswer = () => {
        if (!currentChord) return;
        
        const validSelected = selectedNotes.filter(n => n !== null);
        const sortedTarget = [...currentChord.notes].sort();
        const sortedSelected = validSelected.sort();
        
        const isCorrect = 
          sortedTarget.length === sortedSelected.length &&
          sortedTarget.every((val, index) => val === sortedSelected[index]);
          
        if (isCorrect) {
          const endTime = Date.now();
          setTimeTaken(((endTime - startTime) / 1000).toFixed(1));
          setGameState('won');
          playTargetChord();

          const earned = calculatePotentialStars();
          setEarnedStarsForRound(earned);

          setStats(prev => {
            const currentDiffStats = prev[difficulty];
            const newCurrent = currentDiffStats.current + earned;
            return {
              ...prev,
              [difficulty]: {
                current: newCurrent,
                best: Math.max(currentDiffStats.best, newCurrent)
              }
            };
          });

        } else {
          setErrorStatus(true);
          setErrorCount(prev => prev + 1);
          setMistakeMade(true);
          
          setStats(prev => ({
            ...prev,
            [difficulty]: {
              ...prev[difficulty],
              current: 0
            }
          }));

          setTimeout(() => setErrorStatus(false), 2000);
        }
      };

      // Funzione per scorrere la tastiera manualmente
      const scrollPiano = (direction) => {
        if (pianoRef.current) {
          const amount = direction === 'left' ? -200 : 200;
          pianoRef.current.scrollBy({ left: amount, behavior: 'smooth' });
        }
      };

      const renderPiano = () => {
        let whiteKeyIndex = 0;
        const WHITE_KEY_WIDTH = 56;
        const BLACK_KEY_WIDTH = 32;
        
        return (
          <div className="relative w-full max-w-full group">
            
            {/* Pulsante Scorrimento Sinistra */}
            <button
              onClick={() => scrollPiano('left')}
              className="absolute left-0 top-0 bottom-0 z-20 w-12 bg-gradient-to-r from-slate-900 via-slate-900/80 to-transparent flex items-center justify-start opacity-60 hover:opacity-100 transition-opacity"
              title="Scorri a sinistra"
            >
              <div className="bg-slate-800 text-white p-1.5 rounded-r-xl border border-l-0 border-slate-600 shadow-lg">
                <ChevronLeft size={24} />
              </div>
            </button>

            {/* Container Tastiera */}
            <div
              ref={pianoRef}
              className="w-full overflow-x-auto pb-6 pt-2 [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-track]:bg-slate-800 [&::-webkit-scrollbar-track]:rounded-md [&::-webkit-scrollbar-thumb]:bg-slate-600 hover:[&::-webkit-scrollbar-thumb]:bg-slate-500 [&::-webkit-scrollbar-thumb]:rounded-md scroll-smooth touch-pan-x"
            >
              <div className="relative h-64 mx-auto select-none" style={{ width: `${14 * WHITE_KEY_WIDTH}px` }}>
                {PIANO_KEYS.map((key) => {
                  const isWhite = key.type === 'white';
                  const isSelected = selectedNotes.includes(key.id); 
                  
                  let leftPosition;
                  if (isWhite) {
                    leftPosition = whiteKeyIndex * WHITE_KEY_WIDTH;
                    whiteKeyIndex++;
                  } else {
                    leftPosition = (whiteKeyIndex * WHITE_KEY_WIDTH) - (BLACK_KEY_WIDTH / 2);
                  }

                  return (
                    <div
                      key={key.id}
                      onClick={() => assignNoteToActiveBox(key.id)}
                      className={`absolute cursor-pointer border flex flex-col justify-end pb-4 items-center transition-colors duration-150 select-none touch-pan-x
                        ${isWhite 
                          ? `h-64 w-[56px] rounded-b-lg border-slate-300 z-0 active:bg-slate-200 ${isSelected ? 'bg-indigo-200' : 'bg-white hover:bg-slate-100'}` 
                          : `h-40 w-[32px] rounded-b-md border-black z-10 active:bg-slate-600 ${isSelected ? 'bg-indigo-600' : 'bg-slate-900 hover:bg-slate-700'}`
                        }`}
                      style={{ left: `${leftPosition}px` }}
                    >
                      <span className={`text-xs font-semibold pointer-events-none ${isWhite ? 'text-slate-500' : 'text-slate-400'}`}>
                        {isWhite && key.label}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Pulsante Scorrimento Destra */}
            <button
              onClick={() => scrollPiano('right')}
              className="absolute right-0 top-0 bottom-0 z-20 w-12 bg-gradient-to-l from-slate-900 via-slate-900/80 to-transparent flex items-center justify-end opacity-60 hover:opacity-100 transition-opacity"
              title="Scorri a destra"
            >
              <div className="bg-slate-800 text-white p-1.5 rounded-l-xl border border-r-0 border-slate-600 shadow-lg">
                <ChevronRight size={24} />
              </div>
            </button>

          </div>
        );
      };

      const isReadyToSubmit = selectedNotes.length > 0 && selectedNotes.every(note => note !== null);
      const currentStarsPotential = calculatePotentialStars();

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex items-center justify-center p-4 font-sans">
          <div className="max-w-4xl w-full bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
            
            {/* Header App */}
            <div className="bg-slate-900/50 p-6 border-b border-slate-700 flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3 w-full md:w-auto">
                <div className="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 shrink-0">
                  <Volume2 size={24} />
                </div>
                <div>
                  <h1 className="text-xl font-bold">Ear Training</h1>
                  <div className="flex flex-wrap gap-2 mt-2">
                    {Object.keys(stats).map(diff => (
                      <button
                        key={diff}
                        onClick={() => handleDifficultyChange(diff)}
                        className={`px-3 py-1 rounded-full text-xs font-semibold transition-colors
                          ${difficulty === diff 
                            ? 'bg-indigo-600 text-white shadow-md shadow-indigo-500/30' 
                            : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200'
                          }`}
                      >
                        {diff}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              
              {/* Display Stats: Streak di Stelle & Record */}
              <div className="flex items-center gap-4 bg-slate-800/80 px-4 py-2.5 rounded-2xl border border-slate-700 shrink-0 w-full md:w-auto justify-center">
                <div className="flex items-center gap-1.5 text-orange-400" title="Streak Attuale (in Stelle)">
                  <Flame size={20} className={stats[difficulty].current > 0 && gameState === 'playing' ? "animate-pulse" : ""} />
                  <span className="font-bold text-lg leading-none">{stats[difficulty].current}</span>
                  <Star size={14} className="fill-orange-400 opacity-80" />
                </div>
                <div className="w-px h-6 bg-slate-600"></div>
                <div className="flex items-center gap-1.5 text-amber-400" title="Record Streak (in Stelle)">
                  <Trophy size={20} />
                  <span className="font-bold text-lg leading-none">{stats[difficulty].best}</span>
                  <Star size={14} className="fill-amber-400 opacity-80" />
                </div>
              </div>
            </div>

            {/* Area di Gioco */}
            <div className="p-8">
              {gameState === 'idle' ? (
                <div className="text-center py-10">
                  <div className="w-24 h-24 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <Play size={48} className="text-indigo-400 ml-2" />
                  </div>
                  <h2 className="text-3xl font-bold mb-2">Livello {difficulty}</h2>
                  <p className="text-slate-400 max-w-md mx-auto mb-8">
                    {difficulty === 'Principiante' && "Allena l'orecchio relativo e assoluto indovinando una singola nota generata casualmente."}
                    {difficulty === 'Intermedio' && "Riconosci la distanza (intervallo) tra due note. Il sistema ti regala la nota di partenza!"}
                    {difficulty === 'Avanzato' && "Accordi maggiori e minori (3 note). Le fondamenta dell'armonia."}
                    {difficulty === 'Pro' && "Accordi sospesi (sus), diminuiti e aumentati (3 note). Tensione e risoluzione."}
                    {difficulty === 'Jazz' && "Accordi complessi (settime, none, alterati, ecc). Per veri musicisti."}
                  </p>
                  <button 
                    onClick={startGame}
                    className="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-indigo-500/30 flex items-center gap-3 mx-auto"
                  >
                    <Play size={24} />
                    Inizia il Gioco
                  </button>
                </div>
              ) : (
                <div className="flex flex-col gap-8">
                  
                  {/* Controlli Superiori */}
                  <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-6 bg-slate-700/30 p-6 rounded-2xl border border-slate-700">
                    
                    {/* Riascolta Originale (Senza penalità) */}
                    <button 
                      onClick={playTargetChord}
                      className="flex items-center gap-3 bg-slate-700 hover:bg-slate-600 px-6 py-4 rounded-xl font-bold transition-colors w-full md:w-auto justify-center group shadow-md"
                    >
                      <Volume2 className="text-indigo-400 group-hover:scale-110 transition-transform" />
                      <div className="text-left">
                        <div className="leading-tight">
                          {difficulty === 'Principiante' ? 'La Nota da' : difficulty === 'Intermedio' ? "L'Intervallo da" : 'Accordo da'}
                        </div>
                        <div className="text-sm text-slate-400 font-normal">Indovinare</div>
                      </div>
                    </button>

                    {/* Box delle Note e Ascolto Utente */}
                    <div className="flex flex-col items-center md:items-end w-full md:w-auto gap-4">
                      <div className="flex flex-col items-center md:items-end">
                        <p className="text-sm text-slate-400 mb-2 font-medium">
                           {difficulty === 'Principiante' ? "Trova la nota" : difficulty === 'Intermedio' ? "Completa l'intervallo" : "Componi l'accordo"}
                        </p>
                        <div className="flex flex-wrap gap-2 sm:gap-3 justify-center">
                          {selectedNotes.map((noteId, i) => {
                            const keyInfo = PIANO_KEYS.find(k => k.id === noteId);
                            const isActive = activeBoxIndex === i && gameState === 'playing';
                            const isLocked = difficulty === 'Intermedio' && i === 0; // Il box regalato
                            
                            return (
                              <div 
                                key={i}
                                onClick={() => selectBox(i)}
                                className={`w-12 h-12 sm:w-14 sm:h-14 md:w-16 md:h-16 border-2 rounded-xl flex items-center justify-center text-lg sm:text-xl font-bold transition-all 
                                  ${isLocked 
                                    ? 'border-slate-500 bg-slate-700/50 cursor-not-allowed opacity-80' 
                                    : isActive 
                                      ? 'border-amber-400 ring-4 ring-amber-400/20 scale-105 cursor-pointer' 
                                      : 'border-slate-600 hover:border-slate-400 cursor-pointer'
                                  }
                                  ${noteId && !isLocked
                                    ? 'bg-indigo-600/20 text-indigo-300 shadow-inner' 
                                    : noteId && isLocked 
                                      ? 'text-slate-300' 
                                      : 'bg-slate-800/80 text-transparent'
                                  }
                                `}
                              >
                                {keyInfo ? keyInfo.label : ''}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      
                      {/* Pulsanti per ascoltare le note correntemente selezionate */}
                      <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto mt-2 md:mt-0">
                        <button 
                          onClick={playUserChord}
                          disabled={!selectedNotes.some(n => n !== null)}
                          className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all w-full sm:w-auto
                            ${selectedNotes.some(n => n !== null) 
                              ? 'bg-slate-600 hover:bg-slate-500 text-white' 
                              : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'
                            }`}
                          title="Suona tutte le note insieme"
                        >
                          <Music size={16} className={selectedNotes.some(n => n !== null) ? 'text-amber-400' : ''} />
                          {difficulty === 'Principiante' ? 'Riproduci' : difficulty === 'Intermedio' ? 'Armonico' : 'Accordo'}
                        </button>
                        {difficulty !== 'Principiante' && (
                          <button 
                            onClick={playUserArpeggio}
                            disabled={!selectedNotes.some(n => n !== null)}
                            className={`flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition-all w-full sm:w-auto
                              ${selectedNotes.some(n => n !== null) 
                                ? 'bg-slate-600 hover:bg-slate-500 text-white' 
                                : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'
                              }`}
                            title="Suona le note una per una"
                          >
                            <Play size={16} className={selectedNotes.some(n => n !== null) ? 'text-emerald-400' : ''} />
                            {difficulty === 'Intermedio' ? 'Melodico' : 'Arpeggio'}
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Area Messaggi e Invia */}
                  <div className="flex flex-col items-center justify-center h-28">
                    {gameState === 'playing' ? (
                      <div className="flex flex-col items-center gap-3">
                        <div className="flex items-center gap-2 text-sm font-semibold text-slate-400">
                          Stelle in palio: 
                          <div className="flex gap-1">
                            {[...Array(3)].map((_, i) => (
                              <Star 
                                key={i} 
                                size={18} 
                                className={`transition-all duration-300 ${i < currentStarsPotential ? "text-amber-400 fill-amber-400" : "text-slate-600"}`} 
                              />
                            ))}
                          </div>
                        </div>
                        <div className="flex flex-col sm:flex-row items-center gap-4">
                          <button
                            onClick={checkAnswer}
                            disabled={!isReadyToSubmit}
                            className={`flex items-center gap-2 px-8 py-3 rounded-xl font-bold text-lg transition-all
                              ${isReadyToSubmit
                                ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-600/30'
                                : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                              }`}
                          >
                            <Check size={24} />
                            Invia Risposta
                          </button>
                          {errorStatus && (
                            <span className="text-rose-400 flex items-center gap-2 font-medium animate-pulse">
                              <AlertCircle size={20} />
                              -1 Stella!
                            </span>
                          )}
                        </div>
                      </div>
                    ) : (
                      <div className="flex flex-col items-center gap-4 animate-in fade-in slide-in-from-bottom-4">
                        <div className="text-emerald-400 font-bold text-xl sm:text-2xl flex flex-col items-center gap-2 text-center">
                          <div className="flex items-center gap-2">
                            <Check size={32} className="shrink-0" />
                            Esatto! Era {difficulty === 'Principiante' ? 'il ' : 'un '}{currentChord.name}
                          </div>
                          {earnedStarsForRound > 0 ? (
                            <div className="flex items-center gap-1 text-amber-400 text-lg">
                              Hai guadagnato +{earnedStarsForRound} <Star size={20} className="fill-amber-400" />
                            </div>
                          ) : (
                            <div className="flex items-center gap-1 text-slate-400 text-lg">
                              Nessuna stella ottenuta, andrà meglio alla prossima!
                            </div>
                          )}
                        </div>
                        <div className="flex items-center gap-4">
                          {timeTaken && (
                            <div className="flex items-center gap-2 bg-slate-800 text-slate-300 px-4 py-3 rounded-xl font-medium border border-slate-700">
                              <Clock size={18} className="text-indigo-400" />
                              {timeTaken} sec
                            </div>
                          )}
                          <button
                            onClick={startGame}
                            className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-indigo-500/30 flex items-center gap-2"
                          >
                            <RefreshCw size={20} />
                            Prossimo
                          </button>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Pianoforte Interattivo */}
                  {renderPiano()}

                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Montaggio finale sull'HTML
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
